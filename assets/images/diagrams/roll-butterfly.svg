<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="'Source Sans 3','Segoe UI',sans-serif">
  <rect x="1" y="1" width="758" height="398" rx="8" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="24" y="34" font-size="16" font-weight="600" fill="#37474f">Roll error signature &#8212; the &#8220;butterfly&#8221; cross-section</text>
  <text x="24" y="54" font-size="12" fill="#78909c">Two reciprocal lines over a flat seabed, viewed across-track</text>

  <!-- axes -->
  <g stroke="#cfd8dc" stroke-width="1">
    <line x1="80" y1="90" x2="80" y2="330"/>
    <line x1="80" y1="330" x2="700" y2="330"/>
  </g>
  <text x="390" y="356" font-size="11.5" fill="#90a4ae" text-anchor="middle">across-track distance</text>
  <text x="60" y="212" font-size="11.5" fill="#90a4ae" text-anchor="middle" transform="rotate(-90 60 212)">depth</text>
  <g font-size="10.5" fill="#90a4ae">
    <text x="120" y="345" text-anchor="middle">port edge</text>
    <text x="390" y="345" text-anchor="middle">nadir</text>
    <text x="660" y="345" text-anchor="middle">stbd edge</text>
  </g>

  <!-- nadir line -->
  <line x1="390" y1="90" x2="390" y2="330" stroke="#cfd8dc" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- true flat seabed -->
  <line x1="100" y1="210" x2="680" y2="210" stroke="#90a4ae" stroke-width="2" stroke-dasharray="8 5"/>
  <text x="676" y="200" font-size="11" fill="#78909c" text-anchor="end">true seabed (flat)</text>

  <!-- swath 1: tilted one way -->
  <line x1="110" y1="252" x2="670" y2="168" stroke="#3949ab" stroke-width="2.5"/>
  <text x="128" y="274" font-size="12" font-weight="600" fill="#3949ab">line 1 &#8594;</text>

  <!-- swath 2: tilted the other way -->
  <line x1="110" y1="168" x2="670" y2="252" stroke="#00897b" stroke-width="2.5"/>
  <text x="128" y="158" font-size="12" font-weight="600" fill="#00897b">&#8592; line 2 (reciprocal)</text>

  <!-- match at nadir annotation -->
  <circle cx="390" cy="210" r="6" fill="none" stroke="#37474f" stroke-width="1.6"/>
  <text x="390" y="118" font-size="11.5" fill="#37474f" text-anchor="middle">swaths agree at nadir</text>
  <line x1="390" y1="124" x2="390" y2="200" stroke="#37474f" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- divergence arrow at the edge -->
  <g stroke="#ef6c00" stroke-width="1.8">
    <line x1="652" y1="172" x2="652" y2="248"/>
    <line x1="646" y1="178" x2="652" y2="170"/>
    <line x1="658" y1="178" x2="652" y2="170"/>
    <line x1="646" y1="242" x2="652" y2="250"/>
    <line x1="658" y1="242" x2="652" y2="250"/>
  </g>
  <text x="640" y="140" font-size="11.5" fill="#ef6c00" text-anchor="end">divergence grows with beam angle</text>
  <text x="640" y="155" font-size="11.5" fill="#ef6c00" text-anchor="end">= 2 &#215; roll error at the edge</text>

  <text x="24" y="380" font-size="11.5" fill="#78909c">Symmetrical about nadir &#8594; roll. Asymmetric or a constant shift &#8594; suspect latency or heave, not roll.</text>
</svg>
