<svg viewBox="0 0 760 420" xmlns="http://www.w3.org/2000/svg" font-family="'Source Sans 3','Segoe UI',sans-serif">
  <rect x="1" y="1" width="758" height="418" rx="8" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="24" y="34" font-size="16" font-weight="600" fill="#37474f">Ellipsoid, geoid and terrain &#8212; the three surfaces of height</text>

  <!-- terrain / sea floor -->
  <path d="M 60 300 C 130 250, 190 320, 260 300 C 330 280, 380 210, 470 240 C 550 266, 620 250, 700 268"
        fill="none" stroke="#b0bec5" stroke-width="2"/>
  <text x="66" y="286" font-size="11.5" fill="#78909c">terrain / sea surface topography</text>

  <!-- geoid: gentle undulation -->
  <path d="M 60 226 C 160 210, 240 244, 340 232 C 440 220, 540 240, 700 222"
        fill="none" stroke="#00897b" stroke-width="2.5"/>
  <text x="66" y="214" font-size="12" font-weight="600" fill="#00897b">geoid (mean sea level, follows gravity)</text>

  <!-- ellipsoid: smooth shallow arc -->
  <path d="M 60 190 Q 380 150 700 190" fill="none" stroke="#3949ab" stroke-width="2.5" stroke-dasharray="9 6"/>
  <text x="66" y="166" font-size="12" font-weight="600" fill="#3949ab">ellipsoid (smooth mathematical model)</text>

  <!-- point P on terrain -->
  <circle cx="470" cy="240" r="6" fill="#ef6c00"/>
  <text x="484" y="246" font-size="12.5" font-weight="600" fill="#ef6c00">P</text>

  <!-- H: P up to geoid (approx x=470: geoid ~231) -->
  <!-- geoid at 470 is ~231; ellipsoid at 470 ~169 -->
  <!-- Draw measurement arrows offset to the left/right for clarity -->

  <!-- h: ellipsoidal height, from P to ellipsoid (right offset) -->
  <g stroke="#3949ab" stroke-width="1.6">
    <line x1="560" y1="243" x2="560" y2="175"/>
    <line x1="554" y1="182" x2="560" y2="173"/>
    <line x1="566" y1="182" x2="560" y2="173"/>
  </g>
  <line x1="470" y1="240" x2="560" y2="243" stroke="#cfd8dc" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="568" y="212" font-size="12.5" font-weight="600" fill="#3949ab">h</text>
  <text x="584" y="212" font-size="11" fill="#78909c">ellipsoidal height (what GNSS measures)</text>

  <!-- H: orthometric height, from P to geoid (left offset) -->
  <g stroke="#00897b" stroke-width="1.6">
    <line x1="410" y1="248" x2="410" y2="234"/>
    <line x1="404" y1="241" x2="410" y2="232"/>
    <line x1="416" y1="241" x2="410" y2="232"/>
  </g>
  <line x1="470" y1="240" x2="410" y2="248" stroke="#cfd8dc" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="330" y="252" font-size="12.5" font-weight="600" fill="#00897b">H</text>
  <text x="346" y="252" font-size="11" fill="#78909c">orthometric</text>

  <!-- N: geoid-ellipsoid separation (far right) -->
  <g stroke="#ef6c00" stroke-width="1.6">
    <line x1="660" y1="222" x2="660" y2="186"/>
    <line x1="654" y1="193" x2="660" y2="184"/>
    <line x1="666" y1="193" x2="660" y2="184"/>
    <line x1="654" y1="215" x2="660" y2="224"/>
    <line x1="666" y1="215" x2="660" y2="224"/>
  </g>
  <text x="672" y="208" font-size="12.5" font-weight="600" fill="#ef6c00">N</text>
  <text x="638" y="208" font-size="11" fill="#78909c" text-anchor="end">geoid&#8211;ellipsoid</text>
  <text x="638" y="221" font-size="11" fill="#78909c" text-anchor="end">separation</text>

  <!-- formula box -->
  <rect x="60" y="342" width="304" height="44" rx="6" fill="#fafafa" stroke="#eceff1"/>
  <text x="76" y="370" font-size="14" fill="#37474f">h &#8776; H + N</text>
  <text x="160" y="370" font-size="11.5" fill="#78909c">GNSS height = orthometric + separation</text>

  <text x="420" y="370" font-size="11.5" fill="#78909c">Mixing up h and H shifts every depth by N &#8212; often tens of metres.</text>
</svg>
